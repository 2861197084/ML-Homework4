[paths]
raw_dir = "../data/raw"
processed_dir = "../data/processed"
artifacts_dir = "../artifacts"
reports_dir = "../reports"
train_file = "adult.data"
test_file = "adult.test"

[download]
zip_urls = [
  "https://cdn.uci-ics-mlr-prod.aws.uci.edu/2/adult.zip",
  "https://archive.ics.uci.edu/static/public/2/adult.zip",
]
raw_train_urls = [
  "https://archive.ics.uci.edu/ml/machine-learning-databases/adult/adult.data",
  "https://raw.githubusercontent.com/Vivek-95/adult_dataset/master/adult.data",
]
raw_test_urls = [
  "https://archive.ics.uci.edu/ml/machine-learning-databases/adult/adult.test",
  "https://raw.githubusercontent.com/Vivek-95/adult_dataset/master/adult.test",
]
timeout_seconds = 60

[experiment]
seed = 42
validation_ratio = 0.2
preprocess_profile = "pdf_default"

[tree]
max_depth = 12
min_samples_split = 16
min_gain = 1e-6

[forest]
n_estimators_grid = [5, 10, 20, 50]
max_features_grid = [3, 4, 6, 8]
max_depth = 14
min_samples_split = 16
min_gain = 1e-6
